# sandbox-mcp configuration reference
#
# To override the built-in defaults, copy this file to:
#   ~/.sandbox-mcp/config.toml        (default location)
#   $SANDBOX_MCP_CONFIG               (env var override)
#
# Every value can also be overridden via env var (uppercased, dots → `_`).
# Example: `port` below becomes SANDBOX_MCP_SERVER_PORT.
#
# Priority order (highest first):
#   1. Environment variables (SANDBOX_MCP_*)
#   2. This config file
#   3. Built-in defaults (which match this file)

[server]
# HTTP server bind address.  Only used by `sandbox-mcp-http`.
host = "0.0.0.0"
port = 8010

# Bearer-token auth for HTTP clients.
# Path to the file with one accepted token per line (the file MUST be
# mode 0600; sandbox-mcp refuses to read a world/group-readable file).
# Overridable via $SANDBOX_MCP_SERVER_AUTH_TOKENS_FILE.
auth_tokens_file = "~/.sandbox-mcp/auth_tokens"

# If true and auth_tokens_file is missing/empty, generate an ephemeral
# token at startup and print it to stderr.  Set to false to fail-closed
# (the server refuses to start without configured tokens).
auto_generate_if_empty = true

[storage]
# Root directory for per-machine persistent workspaces.
# When docker_run creates a container named "dev", sandbox-mcp tells the
# Docker daemon to bind-mount work_home/dev/ to /workspace inside the
# container.  The daemon auto-creates the directory if it doesn't exist.
#
# When running sandbox-mcp inside a container (Docker socket mount), set
# this to the HOST-side path -- the Docker daemon resolves it on the host,
# not inside the container.
# Overridable via $SANDBOX_MCP_STORAGE_WORK_HOME.
work_home = "~/.sandbox-mcp/workspaces/"

# Sub-directory under work_home used as the inter-container shared
# workspace (see docs/sandbox-boundary.md).  Every docker_run auto-
# mounts work_home/<share_subdir>/<machine>/ rw into the container at
# /share/<machine>/, plus every peer subdirectory read-only,
# so containers collaborate via the filesystem without any per-run
# configuration.  Set to "" (empty string) to disable the share mount.
# Overridable via $SANDBOX_MCP_STORAGE_SHARE_SUBDIR.
share_subdir = "_share"

[audit]
# Audit log destination. Default: ~/.sandbox-mcp/audit.db (SQLite).
# A file-backed path enables the audit_query self-audit tool.
#   "" (empty)           = write to stderr (audit_query hidden)
#   ".../audit.db"       = SQLite database (recommended; supports the
#                          self-audit tool with indexed queries)
#   "....jsonl"/other    = append-only JSON-line file (legacy, no
#                          self-audit tool support)
log_path = "~/.sandbox-mcp/audit.db"

[docker]
default_image = "python:3.14-slim"
restart_policy_name = "on-failure"
restart_max_retry_count = 3

write_tmp_prefix = "/tmp/.sandbox-mcp-write-"

# User-defined bridge network for DNS-resolvable container-to-container
# communication.  Created lazily on first docker_run.  Empty = no network.
auto_network = "sandbox-mcp"

# Docker daemon connection.  Leave ``host`` empty (the default) to fall
# back to the standard docker SDK env vars (``$DOCKER_HOST``,
# ``$DOCKER_TLS_VERIFY``, ``$DOCKER_CERT_PATH``) and the docker CLI
# context (``~/.docker/config.json``).  Set ``host`` to point at a
# specific daemon — useful when running sandbox-mcp inside a container
# with the host socket bind-mounted at a non-default path, or when
# talking to a remote docker daemon.  The URL scheme selects transport:
#   ""              → from_env() default (usually unix:///var/run/docker.sock)
#   "unix:///..."   → local socket (when bind-mounted somewhere unusual)
#   "tcp://host:N"  → unencrypted TCP (do NOT expose publicly)
#   "tcp://host:N"  + tls_verify=true → TLS (recommended for remote daemons)
#   "ssh://user@host" → SSH transport (uses your ssh key / config)
# Env vars SANDBOX_MCP_DOCKER_HOST / _TLS_VERIFY / _CERT_PATH override.
host = ""
tls_verify = false
cert_path = ""

# Admin machine: a special container identified purely by name (no extra
# docker label) that gets a "god-mode" mount layout — its own workspace
# at ``/workspace`` PLUS the whole ``work_home`` tree at ``/host`` (rw).
# This lets the agent do cross-machine cleanup, listing, and data
# movement without a dedicated ``workspace_clean`` action.
#
# IMPORTANT: this field is a **feature flag + name**, not a creation
# trigger.  When non-empty, ``DockerBackend.create`` detects matching
# names and applies the god-mode mount.  When empty, no name triggers it
# (admin is just a regular peer).
#
# Actual container creation is driven by ``[default_machine]`` (or an
# explicit ``docker_run name=admin``).  To make admin the initial
# default, set:
#
#   [default_machine]
#   enabled = true
#   name = "admin"   # the default — matches admin_machine above
#
# WARNING: ``/host`` is rw and covers every peer's workspace.  Operations
# there are irreversible.  Agents should default to ``/workspace`` for
# their own work and target ``/host/<peer>/...`` only when explicitly
# managing a peer.  Upgrading an existing deployment: if a container named
# this already exists as a peer, ``docker_remove <name>`` it first so the
# server recreates it with the admin mount (no auto-migration).
admin_machine = "admin"

[ssh]
connect_timeout = 10
socket_dir_prefix = "sandbox-mcp-ssh-"
tmpfile_pattern = ".sandbox-mcp-tmp.XXXXXX"

# Default SSH target used when [default_machine] backend = "ssh".
# Leaving default_host empty disables the SSH default machine.
# The machine name/purpose come from [default_machine]; only the
# connection params live here.
default_host = ""
default_user = ""
default_port = 22
default_key = ""           # empty -> ssh-agent / default key

[shell]
# Buffer sizes and the default per-call output cap (in bytes).
# HEAD_SIZE captures the start of the stream; TAIL_SIZE is a ring buffer
# for the tail.  When output exceeds HEAD+TAIL, the head is dropped and
# only the tail is kept.
default_max_output = 50000  # 50 KB — also the truncation threshold
head_size = 5120          # 5 KB
tail_size = 46080         # 45 KB

[files]
# Hard cap on file_read payload size (bytes).  Files larger than this
# return a "too_large" status with a hint to use the shell tool.
max_file_size = 51200     # 50 KB
max_line_length = 2000
default_read_limit = 500
max_read_limit = 2000
default_search_limit = 50

[default_machine]
# Opt-in: provision a default machine at startup so the agent can use
# shell_exec / file_* immediately, without an explicit
# docker_run / ssh_connect.  Disabled by default -- the historical
# behaviour is lazy (the agent creates its first machine on demand).
#
# Provisioning failure is FATAL: when enabled, the server refuses to
# start if the default machine can't be brought up (fail-closed).  The
# docker_ps reconciliation pass runs first, so on a restart the
# surviving container is re-adopted instead of re-created.
#
# This section holds only the trigger.  Backend-specific params live in
# their own sections: docker image = [docker] default_image; SSH target
# = [ssh] default_host / default_user / default_port / default_key.
enabled = true
backend = "docker"       # "docker" or "ssh"
# Defaults to "admin" so enabling [default_machine] without naming a
# machine provisions the admin container (see [docker] admin_machine).
# DockerBackend.create detects the name match and applies the god-mode
# mount layout — no special-casing in the startup path.
name = "admin"
purpose = ""