# sandbox-mcp configuration reference
#
# To override the built-in defaults, copy this file to:
#   ~/.sandbox-mcp/config.toml        (default location)
#   $SANDBOX_MCP_CONFIG               (env var override)
#
# Every value can also be overridden via env var (uppercased, dots → `_`).
# Example: `port` below becomes SANDBOX_MCP_SERVER_PORT.
#
# Priority order (highest first):
#   1. Environment variables (SANDBOX_MCP_*)
#   2. This config file
#   3. Built-in defaults (which match this file)

[server]
# HTTP/SSE server bind address.  Only used by `sandbox-mcp-http`.
host = "0.0.0.0"
port = 8010

[storage]
# Root directory for per-machine persistent workspaces.
# When docker_run creates a container named "dev", sandbox-mcp will:
#   1. mkdir work_home/dev/
#   2. bind-mount it to /workspace inside the container
# Agent works in /workspace and never sees the host path.
work_home = "~/.sandbox-mcp/workspaces/"

[audit]
# JSON-line audit log destination.
#   "" (empty) = write to stderr (default)
#   "/path/to/file" = append to that file (parent dirs auto-created)
log_path = ""

[docker]
container_name_prefix = "sandbox-"
default_image = "debian:stable-slim"
default_workdir = "/workspace"
image_repo = "sandbox-mcp"
restart_policy_name = "on-failure"
restart_max_retry_count = 3
write_tmp_prefix = "/tmp/.sandbox-mcp-write-"

[ssh]
connect_timeout = 10
socket_dir_prefix = "sandbox-mcp-ssh-"
tmpfile_pattern = ".sandbox-mcp-tmp.XXXXXX"

[shell]
# Buffer sizes and the default per-call output cap (in bytes).
# HEAD_SIZE captures the start of the stream; TAIL_SIZE is a ring buffer
# for the tail.  When output exceeds HEAD+TAIL, the head is dropped and
# only the tail is kept.
default_max_output = 50000  # 50 KB — also the truncation threshold
head_size = 5120          # 5 KB
tail_size = 46080         # 45 KB

[files]
# Hard cap on file_read payload size (bytes).  Files larger than this
# return a "too_large" status with a hint to use the shell tool.
max_file_size = 51200     # 50 KB
max_line_length = 2000
default_read_limit = 500
max_read_limit = 2000
default_search_limit = 50