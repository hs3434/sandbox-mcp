# sandbox-mcp Docker Compose deployment template
#
# Quick start
# -----------
#   1. Generate an auth token:
#        mkdir -p config
#        openssl rand -base64 48 > config/auth_tokens
#        chmod 600 config/auth_tokens
#
#   2. Create config.toml (at minimum, set work_home to the host path):
#        cp config/config.example.toml config/config.toml
#        # edit config/config.toml:
#        #   [storage]
#        #   work_home = "/var/lib/sandbox-mcp/workspaces"  # HOST path
#        #   [docker]
#        #   host = ""  # empty = use socket; or "tcp://10.0.5.20:2376"
#
#   3. (Optional) Override infrastructure values via .env:
#        cat > .env <<EOF
#        SANDBOX_MCP_PORT=8010                    # port used on BOTH host and container
#        DOCKER_SOCK_PATH=/var/run/docker.sock    # host docker socket path
#        EOF
#
#   4. Start the service:
#        docker compose up -d
#
#   5. Verify startup:
#        docker compose logs -f sandbox-mcp
#
#   6. Connect your MCP client:
#        URL:   http://localhost:${SANDBOX_MCP_PORT:-8010}/mcp
#        Token: cat config/auth_tokens
#
# Configuration
# -------------
# All app settings (server, auth, storage, docker, etc.) go in
# config/config.toml -- see config/config.example.toml for a full reference.
# Only infrastructure-level values (ports, socket paths) use .env below.
#
# Workspace path note
# -------------------
# sandbox-mcp runs inside this container but manages Docker containers via the
# HOST Docker daemon (socket mount).  Set ``work_home`` in config.toml (or
# override via WORK_HOME in .env) to an absolute HOST-side path.
#
# WORK_HOME MUST be bind-mounted into this container.  Most operations
# (docker_run, shell_exec, file_*, docker cp) go through the daemon and
# don't need filesystem access here, BUT ``docker_build`` is the
# exception: the docker SDK client (running inside this container)
# tar-walks the build context with os.walk + open() before POSTing to
# the daemon, so the path has to be reachable in this container's
# filesystem.  Without this mount you get a misleading
# "You must specify a directory to build in path" error.
#
# ``~`` is NOT expanded (sandbox-mcp refuses paths starting with
# ``~`` — see ``storage.work_home`` in config.example.toml).

services:
  sandbox-mcp:
    build: .
    image: sandbox-mcp:latest
    container_name: sandbox-mcp
    restart: unless-stopped

    ports:
      - "${SANDBOX_MCP_PORT:-8010}:${SANDBOX_MCP_PORT:-8010}"

    # Pass the chosen port + work_home into the container so the
    # healthcheck / filesystem path / config all agree on the same value.
    environment:
      SANDBOX_MCP_SERVER_PORT: ${SANDBOX_MCP_PORT:-8010}
      # Override config.toml's [storage] work_home so the in-container
      # get_work_home() returns the bind-mounted path.
      SANDBOX_MCP_STORAGE_WORK_HOME: ${WORK_HOME:-/var/lib/sandbox-mcp}

    volumes:
      # Docker socket - lets sandbox-mcp manage containers on the host.
      # The host-side path varies (system docker: /var/run/docker.sock;
      # rootless docker: /run/user/<uid>/docker.sock); set DOCKER_SOCK_PATH.
      # The container-side path is always the standard /var/run/docker.sock
      # so docker.from_env() finds it without extra config.
      # For remote Docker daemons (TCP/TLS), remove this mount and set
      # [docker] host in config.toml to e.g. "tcp://10.0.5.20:2376".
      - "${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock"

      # Config directory: auth_tokens, config.toml, audit.log
      - ./config:/home/sandbox/.sandbox-mcp

      # work_home: required for docker_build (SDK client tar-walks the
      # build context).  See "Workspace path note" above for the why.
      # Override via WORK_HOME in .env if config.toml uses a non-default.
      - "${WORK_HOME:-/var/lib/sandbox-mcp}:${WORK_HOME:-/var/lib/sandbox-mcp}"

    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - 'import os, socket; socket.create_connection(("localhost", int(os.environ["SANDBOX_MCP_SERVER_PORT"])), timeout=3).close()'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
