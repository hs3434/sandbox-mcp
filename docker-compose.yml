# sandbox-mcp Docker Compose deployment template
#
# Quick start
# -----------
#   1. Generate an auth token:
#        mkdir -p config
#        openssl rand -base64 48 > config/auth_tokens
#        chmod 600 config/auth_tokens
#
#   2. Create config.toml (at minimum, set work_home to the host path):
#        cp config/config.example.toml config/config.toml
#        # edit config/config.toml:
#        #   [storage]
#        #   work_home = "/var/lib/sandbox-mcp/workspaces"  # HOST path
#        #   [docker]
#        #   host = ""  # empty = use socket; or "tcp://10.0.5.20:2376"
#
#   3. (Optional) Override infrastructure values via .env:
#        cat > .env <<EOF
#        SANDBOX_MCP_PORT=8010                    # host port to expose
#        DOCKER_SOCK_PATH=/var/run/docker.sock    # host docker socket path
#        EOF
#
#   4. Start the service:
#        docker compose up -d
#
#   5. Verify startup:
#        docker compose logs -f sandbox-mcp
#
#   6. Connect your MCP client:
#        URL:   http://localhost:${SANDBOX_MCP_PORT:-8010}/mcp
#        Token: cat config/auth_tokens
#
# Configuration
# -------------
# All app settings (server, auth, storage, docker, etc.) go in
# config/config.toml -- see config/config.example.toml for a full reference.
# Only infrastructure-level values (ports, socket paths) use .env below.
#
# Workspace path note
# -------------------
# sandbox-mcp runs inside this container but manages Docker containers via the
# HOST Docker daemon (socket mount).  Set ``work_home`` in config.toml to the
# HOST-side path -- the Docker daemon resolves it on the host and auto-creates
# subdirectories as needed, so no workspace volume mount is required here.

services:
  sandbox-mcp:
    build: .
    image: sandbox-mcp:latest
    container_name: sandbox-mcp
    restart: unless-stopped

    ports:
      - "${SANDBOX_MCP_PORT:-8010}:8010"

    volumes:
      # Docker socket - lets sandbox-mcp manage containers on the host.
      # The host-side path varies (system docker: /var/run/docker.sock;
      # rootless docker: /run/user/<uid>/docker.sock); set DOCKER_SOCK_PATH.
      # The container-side path is always the standard /var/run/docker.sock
      # so docker.from_env() finds it without extra config.
      # For remote Docker daemons (TCP/TLS), remove this mount and set
      # [docker] host in config.toml to e.g. "tcp://10.0.5.20:2376".
      - "${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock"

      # Config directory: auth_tokens, config.toml, audit.log
      - ./config:/home/sandbox/.sandbox-mcp

    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - 'import socket; socket.create_connection(("localhost", 8010), timeout=3).close()'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
